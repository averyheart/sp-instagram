<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=National+Park:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0e0e; color: #ede9e3; font-family: 'National Park', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { text-align: center; padding: 40px 20px; }
    h1 { font-family: 'National Park', serif; font-size: 28px; letter-spacing: -0.3px; margin-bottom: 8px; }
    p { font-size: 13px; color: #6a6560; margin-bottom: 36px; }
    .list { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    a { display: block; padding: 12px 32px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; color: #ede9e3; text-decoration: none; font-size: 14px; font-weight: 500; transition: background 0.18s; min-width: 200px; }
    a:hover { background: #222; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Companions</h1>
    <p>Select a profile to view.</p>
    <div class="list">
      <a href="./characters/luca/">Luca Bergren</a>
      <!-- Add new characters here as: <a href="./characters/charactername/">Character Name</a> -->
    </div>
  </div>
</body>
</html>
